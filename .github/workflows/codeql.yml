name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read          # ✅ จำกัดสิทธิ์ให้อ่านเนื้อหา repo เท่านั้น
  security-events: write  # ✅ จำเป็นสำหรับ CodeQL เพื่อเขียนผลการสแกน

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3
