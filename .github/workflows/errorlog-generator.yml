name: Error Log Generator

on:
  push:
    branches:
      - main
      - patch-*
    paths:
      - 'scripts/errorlog-generator/**'
      - '.github/workflows/errorlog-generator.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/errorlog-generator/**'
  workflow_dispatch:

jobs:
  generate-error-logs:
    runs-on: ubuntu-latest
    name: Generate Error Logs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        working-directory: scripts/errorlog-generator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run error log generator
        working-directory: scripts/errorlog-generator
        run: python errorlog_generator.py

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: error-logs
          path: scripts/errorlog-generator/logs/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "❌ Error log generation failed"

      - name: Notify on success
        if: success()
        run: echo "✅ Error logs generated successfully"
